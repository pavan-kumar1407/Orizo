[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Force download for exe files ──
[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

# ── SPA routing fix ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
